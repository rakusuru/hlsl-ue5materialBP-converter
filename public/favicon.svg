<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Rich green background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Node outline - white, clean -->
  <rect x="8" y="6" width="16" height="20" rx="3" fill="none" stroke="#fff" stroke-width="1.8"/>
  <!-- Title bar divider -->
  <line x1="8" y1="11.5" x2="24" y2="11.5" stroke="#fff" stroke-width="1.2"/>

  <!-- Input pin dots (left) -->
  <circle cx="8" cy="16" r="1.8" fill="#fff"/>
  <circle cx="8" cy="21" r="1.8" fill="#fff"/>

  <!-- Output pin dot (right) -->
  <circle cx="24" cy="18" r="1.8" fill="#fff"/>

  <!-- Code hint: tiny </> in title area -->
  <text x="16" y="10" text-anchor="middle" font-family="monospace" font-weight="700" font-size="5" fill="rgba(255,255,255,0.9)">&lt;/&gt;</text>
</svg>
