<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLSL ŌåÆ UE5 Material Blueprint Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d1a; }
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useCallback, useRef } = React;

// ============================================================
// Constants
// ============================================================
const HLSL_KEYWORDS = new Set([
  "if","else","for","while","do","return","break","continue","switch","case","default",
  "struct","typedef","void","const","static","inline","true","false","discard",
]);

const HLSL_TYPES = new Set([
  "float","float1","float2","float3","float4",
  "half","half1","half2","half3","half4",
  "int","int2","int3","int4",
  "uint","uint2","uint3","uint4",
  "bool","bool2","bool3","bool4",
  "Texture2D","Texture3D","TextureCube","SamplerState",
  "FMaterialPixelParameters","FMaterialVertexParameters",
]);

const HLSL_BUILTINS = new Set([
  "sin","cos","tan","asin","acos","atan","atan2","sincos",
  "sqrt","rsqrt","pow","exp","exp2","log","log2","log10",
  "abs","sign","floor","ceil","round","trunc","frac","fmod","modf",
  "min","max","clamp","saturate","lerp","step","smoothstep",
  "dot","cross","normalize","length","distance","reflect","refract",
  "mul","transpose","determinant","ddx","ddy","fwidth",
  "any","all","clip","tex2D","tex2Dlod","Sample",
  "radians","degrees","mad","rcp","isnan","isinf","isfinite",
  "asuint","asfloat","asint","f16tof32","f32tof16",
  "countbits","firstbithigh","firstbitlow","reversebits",
  "InterlockedAdd","InterlockedAnd","InterlockedOr","InterlockedXor",
  "InterlockedMin","InterlockedMax","InterlockedExchange","InterlockedCompareExchange",
  "GroupMemoryBarrier","GroupMemoryBarrierWithGroupSync","DeviceMemoryBarrier",
  "AllMemoryBarrier","AllMemoryBarrierWithGroupSync",
]);

const UE_BUILTINS = new Set([
  "View","ResolvedView","Primitive","Parameters",
  "GetDefaultSceneTextureUV","CalcSceneTexCoord",
  "SceneTextureLookup","DecodeSceneColorForMaterialNode",
  "GetScreenPosition","GetWorldPosition",
  "MaterialFloat","MaterialFloat2","MaterialFloat3","MaterialFloat4",
]);

const NODE_TYPES = [
  { value: "ScalarParameter", label: "Scalar Parameter" },
  { value: "VectorParameter", label: "Vector Parameter" },
  { value: "TextureObjectParameter", label: "Texture Object Parameter" },
  { value: "TextureCoordinate", label: "Texture Coordinate" },
  { value: "Time", label: "Time" },
  { value: "Constant", label: "Constant" },
  { value: "Constant3Vector", label: "Constant3Vector" },
];

const OUTPUT_TYPES = [
  { value: "CMOT_Float1", label: "Float 1" },
  { value: "CMOT_Float2", label: "Float 2" },
  { value: "CMOT_Float3", label: "Float 3 (default)" },
  { value: "CMOT_Float4", label: "Float 4" },
  { value: "CMOT_MaterialAttributes", label: "Material Attributes" },
];

// ============================================================
// GUID / ID Generation
// ============================================================
function generateGUID() {
  const hex = "0123456789ABCDEF";
  let guid = "";
  for (let i = 0; i < 32; i++) {
    guid += hex[Math.floor(Math.random() * 16)];
  }
  return guid;
}

// ============================================================
// HLSL Parser
// ============================================================
function parseHLSL(code) {
  let cleaned = code.replace(/\/\/.*$/gm, " ");
  cleaned = cleaned.replace(/\/\*[\s\S]*?\*\//g, " ");

  const declaredVars = new Map();
  const typePatternStr = "\\b(float[1234]?|half[1234]?|int[234]?|uint[234]?|bool[234]?)\\s+(\\w+)";
  const typePattern = new RegExp(typePatternStr, "g");
  let match;
  while ((match = typePattern.exec(cleaned)) !== null) {
    declaredVars.set(match[2], match[1]);
  }

  const texSamplePattern = /(\w+)\.Sample\s*\(\s*(\w+)/g;
  const textureVars = new Set();
  const samplerVars = new Set();
  while ((match = texSamplePattern.exec(cleaned)) !== null) {
    textureVars.add(match[1]);
    samplerVars.add(match[2]);
  }

  const assignedUndeclared = new Set();
  const codeLines = cleaned.split(/\n/);
  for (const line of codeLines) {
    const lineMatches = [...line.matchAll(/\b([A-Za-z_]\w*)\s*([+\-*\/!<>]?)=/g)];
    for (const m of lineMatches) {
      if (m[2] === "" && line[m.index + m[0].length] !== "=") {
        const name = m[1];
        if (!declaredVars.has(name) && !HLSL_KEYWORDS.has(name) && !HLSL_TYPES.has(name)) {
          assignedUndeclared.add(name);
        }
      }
    }
  }

  const identPattern = /(?<!\.)(\b[A-Za-z_]\w*)\b/g;
  const allIdents = new Set();
  while ((match = identPattern.exec(cleaned)) !== null) {
    allIdents.add(match[1]);
  }

  const readVars = new Set();
  const lines = cleaned.split("\n");
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const eqIdx = trimmed.indexOf("=");
    if (eqIdx > 0 && trimmed[eqIdx - 1] !== "!" && trimmed[eqIdx - 1] !== "<" && 
        trimmed[eqIdx - 1] !== ">" && trimmed[eqIdx + 1] !== "=") {
      const rhs = trimmed.substring(eqIdx + 1);
      const rhsIdents = rhs.matchAll(/(?<!\.)(\b[A-Za-z_]\w*)\b/g);
      for (const m of rhsIdents) readVars.add(m[1]);
    } else {
      const lineIdents = trimmed.matchAll(/(?<!\.)(\b[A-Za-z_]\w*)\b/g);
      for (const m of lineIdents) readVars.add(m[1]);
    }
  }

  const swizzleMap = new Map();
  const swizzlePattern = /\b(\w+)\.([xyzwrgba]+)\b/g;
  while ((match = swizzlePattern.exec(cleaned)) !== null) {
    const name = match[1];
    const swizzle = match[2];
    let dim = 1;
    if (/[zb]/.test(swizzle)) dim = Math.max(dim, 3);
    else if (/[yg]/.test(swizzle)) dim = Math.max(dim, 2);
    if (/[wa]/.test(swizzle)) dim = 4;
    const prev = swizzleMap.get(name) || 1;
    swizzleMap.set(name, Math.max(prev, dim));
  }

  const skipSet = new Set([
    ...HLSL_KEYWORDS, ...HLSL_TYPES, ...HLSL_BUILTINS, ...UE_BUILTINS,
    ...samplerVars, ...declaredVars.keys(),
  ]);

  const inputs = [];
  const outputs = [];

  for (const name of allIdents) {
    if (skipSet.has(name)) continue;
    if (/^\d/.test(name)) continue;
    if (name.length <= 1 && /^[a-z]$/.test(name)) continue;

    const isTexture = textureVars.has(name);
    const isAssigned = assignedUndeclared.has(name);
    const isRead = readVars.has(name);

    if (isTexture) {
      inputs.push({ name, inferredType: "Texture2D", nodeType: "TextureObjectParameter", defaultValue: "" });
      continue;
    }

    if (isAssigned && !isRead) {
      outputs.push({ name });
      continue;
    }

    if (isRead && !declaredVars.has(name)) {
      if (isAssigned) {
        const firstReadIdx = cleaned.indexOf(name);
        const assignRegex = new RegExp(`\\b${name}\\s*=`);
        const firstAssignMatch = assignRegex.exec(cleaned);
        if (firstAssignMatch && firstAssignMatch.index <= firstReadIdx + name.length + 3) {
          outputs.push({ name });
          continue;
        }
      }

      let inferredType = "float";
      let nodeType = "ScalarParameter";
      let defaultValue = "0.0";

      const swizzleDim = swizzleMap.get(name);
      if (swizzleDim) {
        if (swizzleDim >= 4) { inferredType = "float4"; nodeType = "VectorParameter"; defaultValue = "(R=0.0,G=0.0,B=0.0,A=1.0)"; }
        else if (swizzleDim >= 3) { inferredType = "float3"; nodeType = "VectorParameter"; defaultValue = "(R=0.0,G=0.0,B=0.0,A=1.0)"; }
        else if (swizzleDim >= 2) { inferredType = "float2"; nodeType = "VectorParameter"; defaultValue = "(R=0.0,G=0.0,B=0.0,A=1.0)"; }
      }

      const nameLower = name.toLowerCase();
      if (nameLower === "time" || nameLower === "gametime") {
        nodeType = "Time"; inferredType = "float"; defaultValue = "";
      } else if (nameLower.includes("uv") || nameLower.includes("texcoord") || nameLower.includes("coord")) {
        nodeType = "TextureCoordinate"; inferredType = "float2"; defaultValue = "";
      } else if (nameLower.includes("color") || nameLower.includes("colour")) {
        if (nodeType !== "VectorParameter") {
          nodeType = "VectorParameter"; inferredType = "float3"; defaultValue = "(R=0.0,G=0.0,B=0.0,A=1.0)";
        }
      }

      inputs.push({ name, inferredType, nodeType, defaultValue });
    }
  }

  let returnType = "CMOT_Float3";
  const returnPattern = /return\s+([\w.]+)/;
  const retMatch = cleaned.match(returnPattern);
  if (retMatch) {
    const retVarType = declaredVars.get(retMatch[1]);
    if (retVarType) {
      if (retVarType === "float" || retVarType === "float1") returnType = "CMOT_Float1";
      else if (retVarType === "float2") returnType = "CMOT_Float2";
      else if (retVarType === "float3") returnType = "CMOT_Float3";
      else if (retVarType === "float4") returnType = "CMOT_Float4";
    }
  }
  const retConstructor = cleaned.match(/return\s+(float[1234]?)\s*\(/);
  if (retConstructor) {
    const t = retConstructor[1];
    if (t === "float" || t === "float1") returnType = "CMOT_Float1";
    else if (t === "float2") returnType = "CMOT_Float2";
    else if (t === "float3") returnType = "CMOT_Float3";
    else if (t === "float4") returnType = "CMOT_Float4";
  }

  const typeOrder = { TextureCoordinate: 0, Time: 1, VectorParameter: 2, ScalarParameter: 3, TextureObjectParameter: 4, Constant: 5, Constant3Vector: 5 };
  inputs.sort((a, b) => (typeOrder[a.nodeType] ?? 99) - (typeOrder[b.nodeType] ?? 99));

  return { inputs, outputs, returnType };
}

// ============================================================
// Blueprint Paste Format Generator
// ============================================================
function generateBlueprintPaste(hlslCode, inputs, outputs, returnType, materialName) {
  const escCode = hlslCode.replace(/\r\n/g, "\n").replace(/\n/g, "\\r\\n").replace(/"/g, '\\"');
  const matPath = `/Engine/Transient.${materialName}`;
  const graphPath = `${matPath}:MaterialGraph_0`;

  let nodeIdx = 0;
  const nodeData = [];
  
  for (const inp of inputs) {
    const data = { idx: nodeIdx, input: inp, extraNodes: [] };
    switch (inp.nodeType) {
      case "ScalarParameter":
        data.expressionClass = "MaterialExpressionScalarParameter";
        data.expressionName = `MaterialExpressionScalarParameter_${nodeIdx}`;
        break;
      case "VectorParameter":
        data.expressionClass = "MaterialExpressionVectorParameter";
        data.expressionName = `MaterialExpressionVectorParameter_${nodeIdx}`;
        break;
      case "TextureObjectParameter":
        data.expressionClass = "MaterialExpressionTextureObjectParameter";
        data.expressionName = `MaterialExpressionTextureObjectParameter_${nodeIdx}`;
        break;
      case "TextureCoordinate":
        data.expressionClass = "MaterialExpressionTextureCoordinate";
        data.expressionName = `MaterialExpressionTextureCoordinate_${nodeIdx}`;
        break;
      case "Time":
        data.expressionClass = "MaterialExpressionTime";
        data.expressionName = `MaterialExpressionTime_${nodeIdx}`;
        break;
      case "Constant":
        data.expressionClass = "MaterialExpressionConstant";
        data.expressionName = `MaterialExpressionConstant_${nodeIdx}`;
        break;
      case "Constant3Vector":
        data.expressionClass = "MaterialExpressionConstant3Vector";
        data.expressionName = `MaterialExpressionConstant3Vector_${nodeIdx}`;
        break;
      default:
        data.expressionClass = "MaterialExpressionScalarParameter";
        data.expressionName = `MaterialExpressionScalarParameter_${nodeIdx}`;
    }
    nodeData.push(data);
    nodeIdx++;
  }

  const customNodePinIds = {};
  inputs.forEach((inp) => { customNodePinIds[inp.name] = generateGUID(); });
  const returnPinId = generateGUID();
  const outputPinIds = {};
  outputs.forEach(out => { outputPinIds[out.name] = generateGUID(); });
  const sourceOutputPinIds = {};
  nodeData.forEach(nd => { sourceOutputPinIds[nd.input.name] = generateGUID(); });

  const customNodeGuid = generateGUID();
  const customExprGuid = generateGUID();

  const customX = -800;
  const customY = 16;
  const paramBaseX = -1500;
  let paramY = -640;
  const paramYSpacing = 112;

  let result = "";
  const customNodeName = "MaterialGraphNode_Custom_0";
  const customExprName = "MaterialExpressionCustom_0";
  
  result += `Begin Object Class=/Script/UnrealEd.MaterialGraphNode_Custom Name="${customNodeName}" ExportPath="/Script/UnrealEd.MaterialGraphNode_Custom'${graphPath}.${customNodeName}'"\n`;
  result += `   Begin Object Class=/Script/Engine.MaterialExpressionCustom Name="${customExprName}" ExportPath="/Script/Engine.MaterialExpressionCustom'${graphPath}.${customNodeName}.${customExprName}'"\n`;
  result += `   End Object\n`;
  result += `   Begin Object Name="${customExprName}" ExportPath="/Script/Engine.MaterialExpressionCustom'${graphPath}.${customNodeName}.${customExprName}'"\n`;
  result += `      Code="${escCode}"\n`;
  
  if (returnType !== "CMOT_Float3") {
    result += `      OutputType=${returnType}\n`;
  }

  inputs.forEach((inp, i) => {
    const nd = nodeData[i];
    const nodeName = `MaterialGraphNode_${nd.idx}`;
    const exprRef = `/Script/Engine.${nd.expressionClass}'${nodeName}.${nd.expressionName}'`;
    let inputLine = `      Inputs(${i})=(InputName="${inp.name}",Input=(Expression="${exprRef}"`;
    if (inp.nodeType === "VectorParameter" && (inp.inferredType === "float3" || !inp.inferredType.includes("4"))) {
      inputLine += `,Mask=1,MaskR=1,MaskG=1,MaskB=1`;
    }
    inputLine += `))`;
    result += inputLine + "\n";
  });

  outputs.forEach((out, i) => {
    result += `      AdditionalOutputs(${i})=(OutputName="${out.name}")\n`;
  });

  result += `      ShowCode=True\n`;
  result += `      MaterialExpressionEditorX=${customX}\n`;
  result += `      MaterialExpressionEditorY=${customY}\n`;
  result += `      MaterialExpressionGuid=${customExprGuid}\n`;
  result += `      Material="/Script/UnrealEd.PreviewMaterial'${matPath}'"\n`;
  if (outputs.length > 0) {
    result += `      bShowOutputNameOnPin=True\n`;
  }
  result += `      Outputs(0)=(OutputName="return")\n`;
  outputs.forEach((out, i) => {
    result += `      Outputs(${i + 1})=(OutputName="${out.name}")\n`;
  });
  result += `   End Object\n`;
  result += `   MaterialExpression="/Script/Engine.MaterialExpressionCustom'${customExprName}'"\n`;
  result += `   NodePosX=${customX}\n`;
  result += `   NodePosY=${customY}\n`;
  result += `   NodeGuid=${customNodeGuid}\n`;

  inputs.forEach((inp) => {
    const pinId = customNodePinIds[inp.name];
    const srcPinId = sourceOutputPinIds[inp.name];
    const nd = nodeData.find(n => n.input.name === inp.name);
    const srcNodeName = `MaterialGraphNode_${nd.idx}`;
    result += `   CustomProperties Pin (PinId=${pinId},PinName="${inp.name}",PinType.PinCategory="required",PinType.PinSubCategory="",PinType.PinSubCategoryObject=None,PinType.PinSubCategoryMemberReference=(),PinType.PinValueType=(),PinType.ContainerType=None,PinType.bIsReference=False,PinType.bIsConst=False,PinType.bIsWeakPointer=False,PinType.bIsUObjectWrapper=False,PinType.bSerializeAsSinglePrecisionFloat=False,LinkedTo=(${srcNodeName} ${srcPinId},),PersistentGuid=00000000000000000000000000000000,bHidden=False,bNotConnectable=False,bDefaultValueIsReadOnly=False,bDefaultValueIsIgnored=False,bAdvancedView=False,bOrphanedPin=False,)\n`;
  });

  result += `   CustomProperties Pin (PinId=${returnPinId},PinName="return",Direction="EGPD_Output",PinType.PinCategory="",PinType.PinSubCategory="",PinType.PinSubCategoryObject=None,PinType.PinSubCategoryMemberReference=(),PinType.PinValueType=(),PinType.ContainerType=None,PinType.bIsReference=False,PinType.bIsConst=False,PinType.bIsWeakPointer=False,PinType.bIsUObjectWrapper=False,PinType.bSerializeAsSinglePrecisionFloat=False,PersistentGuid=00000000000000000000000000000000,bHidden=False,bNotConnectable=False,bDefaultValueIsReadOnly=False,bDefaultValueIsIgnored=False,bAdvancedView=False,bOrphanedPin=False,)\n`;

  outputs.forEach((out) => {
    const pinId = outputPinIds[out.name];
    result += `   CustomProperties Pin (PinId=${pinId},PinName="${out.name}",Direction="EGPD_Output",PinType.PinCategory="",PinType.PinSubCategory="",PinType.PinSubCategoryObject=None,PinType.PinSubCategoryMemberReference=(),PinType.PinValueType=(),PinType.ContainerType=None,PinType.bIsReference=False,PinType.bIsConst=False,PinType.bIsWeakPointer=False,PinType.bIsUObjectWrapper=False,PinType.bSerializeAsSinglePrecisionFloat=False,PersistentGuid=00000000000000000000000000000000,bHidden=False,bNotConnectable=False,bDefaultValueIsReadOnly=False,bDefaultValueIsIgnored=False,bAdvancedView=False,bOrphanedPin=False,)\n`;
  });

  result += `End Object\n`;

  for (const nd of nodeData) {
    const inp = nd.input;
    const nodeName = `MaterialGraphNode_${nd.idx}`;
    const exprName = nd.expressionName;
    const exprClass = nd.expressionClass;
    const nodeGuid = generateGUID();
    const exprGuid = generateGUID();
    const paramGuid = generateGUID();
    const outPinId = sourceOutputPinIds[inp.name];
    const linkedPinId = customNodePinIds[inp.name];
    const posX = paramBaseX;
    const posY = paramY;
    paramY += paramYSpacing;

    result += `Begin Object Class=/Script/UnrealEd.MaterialGraphNode Name="${nodeName}" ExportPath="/Script/UnrealEd.MaterialGraphNode'${graphPath}.${nodeName}'"\n`;
    result += `   Begin Object Class=/Script/Engine.${exprClass} Name="${exprName}" ExportPath="/Script/Engine.${exprClass}'${graphPath}.${nodeName}.${exprName}'"\n`;
    result += `   End Object\n`;
    result += `   Begin Object Name="${exprName}" ExportPath="/Script/Engine.${exprClass}'${graphPath}.${nodeName}.${exprName}'"\n`;

    switch (inp.nodeType) {
      case "ScalarParameter": {
        const defVal = inp.defaultValue || "0.0";
        result += `      DefaultValue=${parseFloat(defVal).toFixed(6)}\n`;
        result += `      ParameterName="${inp.name}"\n`;
        result += `      ExpressionGUID=${paramGuid}\n`;
        break;
      }
      case "VectorParameter": {
        const defVal = inp.defaultValue || "(R=0.000000,G=0.000000,B=0.000000,A=1.000000)";
        result += `      DefaultValue=${defVal}\n`;
        result += `      ParameterName="${inp.name}"\n`;
        result += `      ExpressionGUID=${paramGuid}\n`;
        break;
      }
      case "TextureObjectParameter":
        result += `      ParameterName="${inp.name}"\n`;
        result += `      ExpressionGUID=${paramGuid}\n`;
        break;
      case "TextureCoordinate": break;
      case "Time": break;
      case "Constant": {
        const defVal = inp.defaultValue || "0.0";
        result += `      R=${parseFloat(defVal).toFixed(6)}\n`;
        break;
      }
      case "Constant3Vector": {
        const defVal = inp.defaultValue || "(R=0.0,G=0.0,B=0.0)";
        result += `      Constant=${defVal}\n`;
        break;
      }
    }

    result += `      MaterialExpressionEditorX=${posX}\n`;
    result += `      MaterialExpressionEditorY=${posY}\n`;
    result += `      MaterialExpressionGuid=${exprGuid}\n`;
    result += `      Material="/Script/UnrealEd.PreviewMaterial'${matPath}'"\n`;
    result += `   End Object\n`;
    result += `   MaterialExpression="/Script/Engine.${exprClass}'${exprName}'"\n`;
    result += `   NodePosX=${posX}\n`;
    result += `   NodePosY=${posY}\n`;

    if (inp.nodeType === "ScalarParameter" || inp.nodeType === "VectorParameter" || 
        inp.nodeType === "TextureObjectParameter") {
      result += `   bCanRenameNode=True\n`;
    }

    result += `   NodeGuid=${nodeGuid}\n`;

    if (inp.nodeType === "ScalarParameter") {
      const dvPinId = generateGUID();
      result += `   CustomProperties Pin (PinId=${dvPinId},PinName="Default Value",PinType.PinCategory="optional",PinType.PinSubCategory="red",PinType.PinSubCategoryObject=None,PinType.PinSubCategoryMemberReference=(),PinType.PinValueType=(),PinType.ContainerType=None,PinType.bIsReference=False,PinType.bIsConst=False,PinType.bIsWeakPointer=False,PinType.bIsUObjectWrapper=False,PinType.bSerializeAsSinglePrecisionFloat=False,DefaultValue="${inp.defaultValue || "0.0"}",PersistentGuid=00000000000000000000000000000000,bHidden=False,bNotConnectable=True,bDefaultValueIsReadOnly=False,bDefaultValueIsIgnored=False,bAdvancedView=False,bOrphanedPin=False,)\n`;
    } else if (inp.nodeType === "VectorParameter") {
      const dvPinId = generateGUID();
      result += `   CustomProperties Pin (PinId=${dvPinId},PinName="Default Value",PinType.PinCategory="optional",PinType.PinSubCategory="rgba",PinType.PinSubCategoryObject=None,PinType.PinSubCategoryMemberReference=(),PinType.PinValueType=(),PinType.ContainerType=None,PinType.bIsReference=False,PinType.bIsConst=False,PinType.bIsWeakPointer=False,PinType.bIsUObjectWrapper=False,PinType.bSerializeAsSinglePrecisionFloat=False,DefaultValue="${inp.defaultValue || "(R=0.000000,G=0.000000,B=0.000000,A=1.000000)"}",PersistentGuid=00000000000000000000000000000000,bHidden=False,bNotConnectable=True,bDefaultValueIsReadOnly=False,bDefaultValueIsIgnored=False,bAdvancedView=False,bOrphanedPin=False,)\n`;
    } else if (inp.nodeType === "Constant") {
      const dvPinId = generateGUID();
      result += `   CustomProperties Pin (PinId=${dvPinId},PinName="Value",PinType.PinCategory="optional",PinType.PinSubCategory="red",PinType.PinSubCategoryObject=None,PinType.PinSubCategoryMemberReference=(),PinType.PinValueType=(),PinType.ContainerType=None,PinType.bIsReference=False,PinType.bIsConst=False,PinType.bIsWeakPointer=False,PinType.bIsUObjectWrapper=False,PinType.bSerializeAsSinglePrecisionFloat=False,DefaultValue="${inp.defaultValue || "0.0"}",PersistentGuid=00000000000000000000000000000000,bHidden=False,bNotConnectable=True,bDefaultValueIsReadOnly=False,bDefaultValueIsIgnored=False,bAdvancedView=False,bOrphanedPin=False,)\n`;
    }

    const outPinCategory = (inp.nodeType === "VectorParameter") ? "mask" : "";
    result += `   CustomProperties Pin (PinId=${outPinId},PinName="Output",PinFriendlyName=NSLOCTEXT("MaterialGraphNode", "Space", " "),Direction="EGPD_Output",PinType.PinCategory="${outPinCategory}",PinType.PinSubCategory="",PinType.PinSubCategoryObject=None,PinType.PinSubCategoryMemberReference=(),PinType.PinValueType=(),PinType.ContainerType=None,PinType.bIsReference=False,PinType.bIsConst=False,PinType.bIsWeakPointer=False,PinType.bIsUObjectWrapper=False,PinType.bSerializeAsSinglePrecisionFloat=False,LinkedTo=(${customNodeName} ${linkedPinId},),PersistentGuid=00000000000000000000000000000000,bHidden=False,bNotConnectable=False,bDefaultValueIsReadOnly=False,bDefaultValueIsIgnored=False,bAdvancedView=False,bOrphanedPin=False,)\n`;

    if (inp.nodeType === "VectorParameter") {
      for (const [suffix, sub] of [["Output2","red"],["Output3","green"],["Output4","blue"],["Output5","alpha"]]) {
        const chPinId = generateGUID();
        result += `   CustomProperties Pin (PinId=${chPinId},PinName="${suffix}",PinFriendlyName=NSLOCTEXT("MaterialGraphNode", "Space", " "),Direction="EGPD_Output",PinType.PinCategory="mask",PinType.PinSubCategory="${sub}",PinType.PinSubCategoryObject=None,PinType.PinSubCategoryMemberReference=(),PinType.PinValueType=(),PinType.ContainerType=None,PinType.bIsReference=False,PinType.bIsConst=False,PinType.bIsWeakPointer=False,PinType.bIsUObjectWrapper=False,PinType.bSerializeAsSinglePrecisionFloat=False,PersistentGuid=00000000000000000000000000000000,bHidden=False,bNotConnectable=False,bDefaultValueIsReadOnly=False,bDefaultValueIsIgnored=False,bAdvancedView=False,bOrphanedPin=False,)\n`;
      }
    }

    result += `End Object\n`;
  }

  return result;
}
